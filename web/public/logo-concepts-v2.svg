<svg width="1800" height="1400" viewBox="0 0 1800 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="80" x2="1700" y2="1320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22160F"/>
      <stop offset="0.52" stop-color="#15131A"/>
      <stop offset="1" stop-color="#0A1018"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFBC75" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD47A"/>
      <stop offset="0.5" stop-color="#FF9542"/>
      <stop offset="1" stop-color="#E85C29"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1800" height="1400" rx="36" fill="url(#bg)"/>
  <circle cx="230" cy="180" r="210" fill="#F16326" fill-opacity="0.12"/>
  <circle cx="1550" cy="240" r="240" fill="#FFCC7A" fill-opacity="0.08"/>
  <circle cx="1560" cy="1160" r="320" fill="#8D301E" fill-opacity="0.12"/>

  <text x="120" y="110" fill="#F8F3EC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="7">POKERARITYSCANNER</text>
  <text x="120" y="160" fill="#E9D2B7" font-family="Montserrat, Inter, Arial, sans-serif" font-size="44" font-weight="800">Logo comparison, cleaned up</text>
  <text x="120" y="205" fill="#A99A8F" font-family="Inter, Arial, sans-serif" font-size="22">Two directions only: abstract sphere and radar scan. Large emblem first, then real header usage.</text>

  <g transform="translate(120 280)">
    <rect width="740" height="470" rx="34" fill="url(#panel)" stroke="url(#stroke)" stroke-width="1.5"/>
    <text x="44" y="58" fill="#FFD9A1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="4">DIRECTION 1</text>
    <text x="44" y="106" fill="#FAF6F0" font-family="Montserrat, Inter, Arial, sans-serif" font-size="46" font-weight="800">Abstract sphere emblem</text>
    <text x="44" y="146" fill="#B8ADA4" font-family="Inter, Arial, sans-serif" font-size="20">Iconic, balanced, and strongest for app icon recognition.</text>

    <g transform="translate(218 180)">
      <circle cx="150" cy="150" r="150" fill="#0C1016"/>
      <circle cx="150" cy="150" r="149" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
      <circle cx="150" cy="112" r="102" fill="url(#accent)" filter="url(#glow)"/>
      <circle cx="150" cy="186" r="102" fill="#121925"/>
      <rect x="42" y="141" width="216" height="18" rx="9" fill="#F5ECDD"/>
      <circle cx="150" cy="150" r="47" fill="#FBF6ED"/>
      <circle cx="150" cy="150" r="24" fill="#10151D"/>
    </g>

    <text x="44" y="392" fill="#FAF6F0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Brand read</text>
    <text x="44" y="426" fill="#B8ADA4" font-family="Inter, Arial, sans-serif" font-size="19">Feels like a premium collectible signal. Less technical, more memorable.</text>
  </g>

  <g transform="translate(940 280)">
    <rect width="740" height="470" rx="34" fill="url(#panel)" stroke="url(#stroke)" stroke-width="1.5"/>
    <text x="44" y="58" fill="#FFD9A1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="4">DIRECTION 2</text>
    <text x="44" y="106" fill="#FAF6F0" font-family="Montserrat, Inter, Arial, sans-serif" font-size="46" font-weight="800">Radar scan emblem</text>
    <text x="44" y="146" fill="#B8ADA4" font-family="Inter, Arial, sans-serif" font-size="20">More product-led and instantly communicates scanning.</text>

    <g transform="translate(218 180)">
      <circle cx="150" cy="150" r="150" fill="#0C1016"/>
      <circle cx="150" cy="150" r="149" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>
      <circle cx="150" cy="150" r="112" stroke="#E0A156" stroke-opacity="0.34" stroke-width="4"/>
      <circle cx="150" cy="150" r="74" stroke="#E0A156" stroke-opacity="0.54" stroke-width="4"/>
      <circle cx="150" cy="150" r="36" fill="#FFF1D8"/>
      <circle cx="150" cy="150" r="15" fill="#12161E"/>
      <path d="M150 150L260 94" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
      <circle cx="260" cy="94" r="16" fill="#FFD27A"/>
      <path d="M150 150L214 230" stroke="#FFFFFF" stroke-opacity="0.13" stroke-width="6" stroke-linecap="round"/>
      <path d="M150 150L93 74" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="5" stroke-linecap="round"/>
    </g>

    <text x="44" y="392" fill="#FAF6F0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Brand read</text>
    <text x="44" y="426" fill="#B8ADA4" font-family="Inter, Arial, sans-serif" font-size="19">Feels faster and more analytical. Better if the logo should explain the product.</text>
  </g>

  <text x="120" y="860" fill="#E9D2B7" font-family="Montserrat, Inter, Arial, sans-serif" font-size="38" font-weight="800">Header usage mockups</text>
  <text x="120" y="900" fill="#A99A8F" font-family="Inter, Arial, sans-serif" font-size="20">Same site shell, different logo treatment in the header.</text>

  <g transform="translate(120 960)">
    <rect width="740" height="260" rx="30" fill="#15181E" fill-opacity="0.88" stroke="url(#stroke)" stroke-width="1.5"/>
    <rect x="28" y="28" width="684" height="76" rx="20" fill="#1E1C1D" fill-opacity="0.95" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <g transform="translate(58 48)">
      <circle cx="28" cy="18" r="28" fill="#0E131A"/>
      <circle cx="28" cy="10" r="18" fill="url(#accent)"/>
      <circle cx="28" cy="24" r="18" fill="#121925"/>
      <rect x="4" y="16" width="48" height="4" rx="2" fill="#F4ECDD"/>
      <circle cx="28" cy="18" r="8" fill="#FBF6ED"/>
      <circle cx="28" cy="18" r="4" fill="#11161D"/>
      <text x="74" y="14" fill="#FAF6F0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">POKERARITYSCANNER</text>
      <text x="74" y="38" fill="#90857C" font-family="Inter, Arial, sans-serif" font-size="12">Scan. Analyze. Score your rare Pokemon.</text>
    </g>
    <text x="64" y="154" fill="#FFD9A1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="4">HEADER FEEL</text>
    <text x="64" y="192" fill="#FAF6F0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Direction 1 feels more like a strong product badge.</text>
    <text x="64" y="224" fill="#B8ADA4" font-family="Inter, Arial, sans-serif" font-size="18">Cleaner silhouette. More memorable in favicon, app icon, and sticky header.</text>
  </g>

  <g transform="translate(940 960)">
    <rect width="740" height="260" rx="30" fill="#15181E" fill-opacity="0.88" stroke="url(#stroke)" stroke-width="1.5"/>
    <rect x="28" y="28" width="684" height="76" rx="20" fill="#1E1C1D" fill-opacity="0.95" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <g transform="translate(58 48)">
      <circle cx="28" cy="18" r="28" fill="#0E131A"/>
      <circle cx="28" cy="18" r="20" stroke="#E0A156" stroke-opacity="0.34" stroke-width="2.5"/>
      <circle cx="28" cy="18" r="12" stroke="#E0A156" stroke-opacity="0.56" stroke-width="2.5"/>
      <circle cx="28" cy="18" r="6" fill="#FFF1D8"/>
      <path d="M28 18L47 8" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
      <circle cx="47" cy="8" r="4" fill="#FFD27A"/>
      <text x="74" y="14" fill="#FAF6F0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4">POKERARITYSCANNER</text>
      <text x="74" y="38" fill="#90857C" font-family="Inter, Arial, sans-serif" font-size="12">Scan. Analyze. Score your rare Pokemon.</text>
    </g>
    <text x="64" y="154" fill="#FFD9A1" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="4">HEADER FEEL</text>
    <text x="64" y="192" fill="#FAF6F0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Direction 2 feels more like a live scanner product.</text>
    <text x="64" y="224" fill="#B8ADA4" font-family="Inter, Arial, sans-serif" font-size="18">Slightly more technical. Better if “detection” should be visible immediately.</text>
  </g>
</svg>
