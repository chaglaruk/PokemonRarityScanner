<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24170F"/>
      <stop offset="0.55" stop-color="#17131A"/>
      <stop offset="1" stop-color="#0C111A"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB56F" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD47A"/>
      <stop offset="0.52" stop-color="#FF8D3B"/>
      <stop offset="1" stop-color="#EB5A2A"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="32" fill="url(#bg)"/>
  <circle cx="245" cy="165" r="170" fill="#F35E24" fill-opacity="0.12"/>
  <circle cx="1365" cy="170" r="180" fill="#FFD27A" fill-opacity="0.08"/>
  <circle cx="1380" cy="760" r="260" fill="#9A331F" fill-opacity="0.10"/>

  <text x="120" y="112" fill="#F7F1EA" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="6">POKERARITYSCANNER</text>
  <text x="120" y="152" fill="#C6B8AC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600">Emblem logo directions</text>
  <text x="120" y="190" fill="#8F857C" font-family="Inter, Arial, sans-serif" font-size="18">Three distinct routes for the brand mark: abstract sphere, scan radar, and monogram seal.</text>

  <g transform="translate(120 250)">
    <rect width="420" height="520" rx="32" fill="#17171C" fill-opacity="0.72" stroke="url(#panelStroke)" stroke-width="1.5"/>
    <text x="36" y="52" fill="#FFE1B5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3">OPTION 1</text>
    <text x="36" y="92" fill="#F8F4EF" font-family="Montserrat, Inter, Arial, sans-serif" font-size="32" font-weight="800">Abstract sphere emblem</text>
    <text x="36" y="128" fill="#B8AEA6" font-family="Inter, Arial, sans-serif" font-size="16">Circular mark with split core, premium enough for app icon and header badge.</text>

    <g transform="translate(86 178)">
      <circle cx="124" cy="124" r="124" fill="#0D0F14"/>
      <circle cx="124" cy="124" r="123" stroke="#FFF0D0" stroke-opacity="0.1" stroke-width="2"/>
      <circle cx="124" cy="94" r="86" fill="url(#accent)" filter="url(#glow)"/>
      <circle cx="124" cy="157" r="86" fill="#141922"/>
      <rect x="16" y="116" width="216" height="16" rx="8" fill="#F2E9DB" fill-opacity="0.92"/>
      <circle cx="124" cy="124" r="41" fill="#F5F0E7"/>
      <circle cx="124" cy="124" r="21" fill="#11151D"/>
      <path d="M124 18C177 18 219 56 229 110C205 86 169 70 124 70C79 70 43 86 19 110C29 56 71 18 124 18Z" fill="#FFFFFF" fill-opacity="0.10"/>
    </g>

    <text x="36" y="442" fill="#F7F4EF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Signal</text>
    <text x="36" y="474" fill="#AEA39A" font-family="Inter, Arial, sans-serif" font-size="16">Most iconic and app-store friendly route. Feels like a collectible detector without looking playful.</text>
    <text x="36" y="512" fill="#FFBC75" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Best if you want strong recognizability first.</text>
  </g>

  <g transform="translate(590 250)">
    <rect width="420" height="520" rx="32" fill="#17171C" fill-opacity="0.72" stroke="url(#panelStroke)" stroke-width="1.5"/>
    <text x="36" y="52" fill="#FFE1B5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3">OPTION 2</text>
    <text x="36" y="92" fill="#F8F4EF" font-family="Montserrat, Inter, Arial, sans-serif" font-size="32" font-weight="800">Radar scan emblem</text>
    <text x="36" y="128" fill="#B8AEA6" font-family="Inter, Arial, sans-serif" font-size="16">Built around detection rings and a tracking core. More technical and product-led.</text>

    <g transform="translate(86 178)">
      <circle cx="124" cy="124" r="124" fill="#0D0F14"/>
      <circle cx="124" cy="124" r="123" stroke="#FFF0D0" stroke-opacity="0.1" stroke-width="2"/>
      <circle cx="124" cy="124" r="92" stroke="#F0AB5A" stroke-opacity="0.30" stroke-width="3"/>
      <circle cx="124" cy="124" r="62" stroke="#F0AB5A" stroke-opacity="0.50" stroke-width="3"/>
      <circle cx="124" cy="124" r="30" fill="#FFF2D7"/>
      <circle cx="124" cy="124" r="12" fill="#12161D"/>
      <path d="M124 124L214 78" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
      <circle cx="214" cy="78" r="14" fill="#FFD37C"/>
      <path d="M124 124L180 192" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="6" stroke-linecap="round"/>
      <path d="M124 124L78 54" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="4" stroke-linecap="round"/>
    </g>

    <text x="36" y="442" fill="#F7F4EF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Signal</text>
    <text x="36" y="474" fill="#AEA39A" font-family="Inter, Arial, sans-serif" font-size="16">Communicates scanning instantly. Strong fit if the product identity should feel analytical and fast.</text>
    <text x="36" y="512" fill="#FFBC75" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Best if you want the logo to say “detection” at first glance.</text>
  </g>

  <g transform="translate(1060 250)">
    <rect width="420" height="520" rx="32" fill="#17171C" fill-opacity="0.72" stroke="url(#panelStroke)" stroke-width="1.5"/>
    <text x="36" y="52" fill="#FFE1B5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3">OPTION 3</text>
    <text x="36" y="92" fill="#F8F4EF" font-family="Montserrat, Inter, Arial, sans-serif" font-size="32" font-weight="800">PRS monogram seal</text>
    <text x="36" y="128" fill="#B8AEA6" font-family="Inter, Arial, sans-serif" font-size="16">More brand-driven and ownable. Less literal, more premium emblem territory.</text>

    <g transform="translate(86 178)">
      <circle cx="124" cy="124" r="124" fill="#0D0F14"/>
      <circle cx="124" cy="124" r="123" stroke="#FFF0D0" stroke-opacity="0.1" stroke-width="2"/>
      <circle cx="124" cy="124" r="96" fill="url(#accent)" fill-opacity="0.16"/>
      <path d="M74 188V60H138C171 60 190 77 190 104C190 128 176 143 150 149L193 188H151L117 156H107V188H74ZM107 129H134C151 129 159 121 159 108C159 94 151 87 134 87H107V129Z" fill="#FFF4E5"/>
      <path d="M62 218C85 243 115 256 154 256C205 256 236 232 236 194C236 160 215 141 171 131L136 123C117 118 108 112 108 101C108 89 120 81 141 81C163 81 182 88 203 102L222 75C198 56 171 47 138 47C91 47 58 70 58 106C58 141 79 160 121 170L157 178C177 183 186 189 186 201C186 214 173 222 150 222C124 222 102 214 79 194L62 218Z" fill="#FFF4E5" fill-opacity="0.88"/>
    </g>

    <text x="36" y="442" fill="#F7F4EF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Signal</text>
    <text x="36" y="474" fill="#AEA39A" font-family="Inter, Arial, sans-serif" font-size="16">Feels most like a serious product brand. Strong if you want something custom and less referential.</text>
    <text x="36" y="512" fill="#FFBC75" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600">Best if you want a more premium, proprietary brand stamp.</text>
  </g>
</svg>
