<!-- Purpose: Visualize the living metadata refresh loop used in the GitHub README. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Living metadata refresh loop</title>
  <desc id="desc">A visual loop showing public data, generators, validated manifests, and app metadata sync.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.52" stop-color="#14532d"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="300" rx="26" fill="url(#bg)"/>
  <g fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2">
    <circle cx="232" cy="150" r="112"/>
    <circle cx="600" cy="150" r="112"/>
    <circle cx="968" cy="150" r="112"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(74 74)">
      <rect width="266" height="152" rx="24" fill="url(#panel)"/>
      <path d="M66 82 C60 48, 92 32, 119 48 C135 28, 178 40, 178 72 C208 74, 224 112, 198 130 H76 C42 130, 34 92, 66 82 Z" fill="#22c55e" opacity="0.88"/>
      <text x="34" y="54" font-size="17" font-weight="800" fill="#14532d">PUBLIC DATA</text>
      <text x="34" y="110" font-size="23" font-weight="800" fill="#0f172a">species + events</text>
      <text x="34" y="137" font-size="15" fill="#475569">fresh inputs, no private secrets</text>
    </g>
    <path d="M366 150 H462" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <path d="M448 128 L476 150 L448 172" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(500 74)">
      <rect width="266" height="152" rx="24" fill="url(#panel)"/>
      <rect x="42" y="44" width="52" height="52" rx="12" fill="#38bdf8"/>
      <rect x="108" y="44" width="52" height="52" rx="12" fill="#60a5fa"/>
      <rect x="174" y="44" width="52" height="52" rx="12" fill="#818cf8"/>
      <text x="34" y="124" font-size="23" font-weight="800" fill="#0f172a">generation scripts</text>
      <text x="34" y="151" font-size="15" fill="#475569">catalogs, signatures, hashes</text>
    </g>
    <path d="M792 150 H888" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <path d="M874 128 L902 150 L874 172" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(926 74)">
      <rect width="200" height="152" rx="24" fill="url(#panel)"/>
      <path d="M56 44 h88 a16 16 0 0 1 16 16 v50 a16 16 0 0 1-16 16 H56 a16 16 0 0 1-16-16 V60 a16 16 0 0 1 16-16 Z" fill="#f97316" opacity="0.9"/>
      <path d="M78 75 h44 M78 96 h28" stroke="#fff7ed" stroke-width="9" stroke-linecap="round"/>
      <text x="34" y="124" font-size="23" font-weight="800" fill="#0f172a">APK sync</text>
      <text x="34" y="151" font-size="15" fill="#475569">verified metadata</text>
    </g>
  </g>
</svg>
