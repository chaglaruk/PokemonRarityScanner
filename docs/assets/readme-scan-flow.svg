<!-- Purpose: Visualize the scanner evidence pipeline used in the GitHub README. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="310" viewBox="0 0 1200 310" role="img" aria-labelledby="title desc">
  <title id="title">PokeRarityScanner scan flow</title>
  <desc id="desc">A four step visual flow from capture to OCR and vision, event resolution, and rarity scoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="0.45" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="310" rx="26" fill="url(#bg)"/>
  <g opacity="0.16" fill="none" stroke="#ffffff" stroke-width="2">
    <path d="M48 82 C210 14, 380 160, 552 86 S910 34, 1150 118"/>
    <path d="M76 250 C270 186, 410 292, 590 226 S920 172, 1126 244"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(58 62)">
      <rect width="230" height="184" rx="22" fill="url(#card)"/>
      <circle cx="62" cy="68" r="29" fill="#dbeafe"/>
      <rect x="50" y="32" width="24" height="72" rx="8" fill="#2563eb"/>
      <circle cx="62" cy="112" r="4" fill="#1e3a8a"/>
      <text x="32" y="138" font-size="25" font-weight="800" fill="#0f172a">Capture</text>
      <text x="32" y="166" font-size="15" fill="#475569">real phone frames</text>
    </g>
    <path d="M314 154 H389" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <path d="M375 132 L403 154 L375 176" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(414 62)">
      <rect width="230" height="184" rx="22" fill="url(#card)"/>
      <circle cx="62" cy="68" r="30" fill="#dcfce7"/>
      <path d="M45 72 h34 M45 56 h34 M45 88 h22" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
      <text x="32" y="138" font-size="25" font-weight="800" fill="#0f172a">Read</text>
      <text x="32" y="166" font-size="15" fill="#475569">OCR + visual proof</text>
    </g>
    <path d="M670 154 H745" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <path d="M731 132 L759 154 L731 176" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(770 62)">
      <rect width="230" height="184" rx="22" fill="url(#card)"/>
      <circle cx="62" cy="68" r="30" fill="#fef3c7"/>
      <path d="M48 92 C34 70, 42 46, 62 40 C82 46, 90 70, 76 92 Z" fill="#f59e0b"/>
      <circle cx="62" cy="62" r="9" fill="#ffffff"/>
      <text x="32" y="138" font-size="25" font-weight="800" fill="#0f172a">Resolve</text>
      <text x="32" y="166" font-size="15" fill="#475569">variant + event date</text>
    </g>
    <path d="M1026 154 H1080" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <path d="M1066 132 L1094 154 L1066 176" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(1010 62)">
      <rect width="132" height="184" rx="22" fill="url(#card)"/>
      <circle cx="66" cy="68" r="33" fill="#fee2e2"/>
      <path d="M46 84 L58 62 L70 74 L86 48" fill="none" stroke="#dc2626" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="31" y="138" font-size="25" font-weight="800" fill="#0f172a">Score</text>
      <text x="31" y="166" font-size="15" fill="#475569">0..100</text>
    </g>
  </g>
</svg>
