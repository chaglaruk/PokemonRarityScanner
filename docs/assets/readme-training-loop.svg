<!-- Purpose: Visualize the private screenshot training loop used in the GitHub README. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">Private screenshot training loop</title>
  <desc id="desc">A visual loop showing telemetry screenshots, human truth labels, local datasets, model updates, and regression tests.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.5" stop-color="#581c87"/>
      <stop offset="1" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#fdf2f8" stop-opacity="0.93"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="330" rx="28" fill="url(#bg)"/>
  <g opacity="0.2" fill="none" stroke="#ffffff" stroke-width="2">
    <path d="M166 252 C300 92, 520 76, 606 150 S872 238, 1040 76"/>
    <path d="M118 86 C320 234, 464 220, 600 150 S880 36, 1090 220"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(58 74)">
      <rect width="205" height="180" rx="23" fill="url(#card)"/>
      <rect x="50" y="35" width="54" height="92" rx="13" fill="#1f2937"/>
      <rect x="58" y="47" width="38" height="60" rx="8" fill="#facc15"/>
      <rect x="118" y="50" width="48" height="12" rx="6" fill="#e879f9"/>
      <rect x="118" y="78" width="58" height="12" rx="6" fill="#60a5fa"/>
      <rect x="118" y="106" width="36" height="12" rx="6" fill="#34d399"/>
      <text x="30" y="151" font-size="23" font-weight="800" fill="#0f172a">Screenshots</text>
      <text x="30" y="174" font-size="14" fill="#475569">private telemetry export</text>
    </g>
    <path d="M286 164 H354" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <path d="M340 144 L365 164 L340 184" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(386 74)">
      <rect width="205" height="180" rx="23" fill="url(#card)"/>
      <circle cx="66" cy="72" r="34" fill="#dcfce7"/>
      <path d="M50 72 L62 84 L86 54" fill="none" stroke="#16a34a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="30" y="151" font-size="23" font-weight="800" fill="#0f172a">Truth labels</text>
      <text x="30" y="174" font-size="14" fill="#475569">shiny, costume, background</text>
    </g>
    <path d="M614 164 H682" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <path d="M668 144 L693 164 L668 184" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(714 74)">
      <rect width="205" height="180" rx="23" fill="url(#card)"/>
      <path d="M56 48 h92 a15 15 0 0 1 15 15 v70 H41 V63 a15 15 0 0 1 15-15 Z" fill="#c084fc"/>
      <path d="M66 78 h72 M66 103 h48" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
      <text x="30" y="151" font-size="23" font-weight="800" fill="#0f172a">Training set</text>
      <text x="30" y="174" font-size="14" fill="#475569">local-only manifest</text>
    </g>
    <path d="M942 164 H1010" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <path d="M996 144 L1021 164 L996 184" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(1040 74)">
      <rect width="108" height="180" rx="23" fill="url(#card)"/>
      <circle cx="54" cy="72" r="31" fill="#fee2e2"/>
      <path d="M38 70 h32 M54 54 v32" stroke="#dc2626" stroke-width="9" stroke-linecap="round"/>
      <text x="22" y="151" font-size="23" font-weight="800" fill="#0f172a">Tests</text>
      <text x="22" y="174" font-size="14" fill="#475569">regress</text>
    </g>
  </g>
</svg>
